# ARCH-71: AI PR Review — Claude-powered CodeRabbit-erstatning
#
# Kører ved hvert PR-push og poster en review-kommentar med:
#   - Bugs og edge cases
#   - Manglende fejlhåndtering
#   - Cloudflare Workers edge-runtime inkompatibilitet
#   - ArchAI-specifik kontekst (Supabase, Datafordeler, createServerFn)
#
# Skip: tilføj "[skip-ai-review]" i commit message
# Kost: ~$0.006 pr. review (claude-haiku-4-5, 15k chars diff limit)

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check skip flag
        id: skip
        run: |
          MESSAGES=$(git log origin/${{ github.base_ref }}...HEAD --format="%s %b" 2>/dev/null || echo "")
          if echo "$MESSAGES" | grep -q "\[skip-ai-review\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate diff
        id: diff
        if: steps.skip.outputs.skip == 'false'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.ts' '*.tsx' \
            ':!*.test.ts' ':!*.spec.ts' ':!src/routeTree.gen.ts' \
            > diff.txt
          LINES=$(wc -l < diff.txt)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          # Begræns til 15.000 chars (≈4.000 tokens) for at holde kost < $0.01
          head -c 15000 diff.txt > diff_truncated.txt

      - name: Run Claude review
        id: review
        if: steps.skip.outputs.skip == 'false' && steps.diff.outputs.lines > 50
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('diff_truncated.txt', 'utf8').trim();

            if (!diff) {
              return '_Ingen TypeScript-ændringer at reviewe._';
            }

            const systemPrompt = `Du er en senior TypeScript-udvikler der reviewer kode til ArchAI — en TanStack Start SSR-app deployed på Cloudflare Workers.

            Stack-specifik kontekst:
            - Runtime: Cloudflare Workers (edge) — ingen Node.js APIs (fs, path, crypto, Buffer, process.env direkte)
            - Server/klient-grænse: al Supabase/Datafordeler-logik SKAL ligge i createServerFn — aldrig importér server-only moduler direkte i route-filer
            - Supabase: brug supabaseAdmin (service role) server-side, supabase (anon) client-side
            - Datafordeler GraphQL: kun ét root field pr. query, virkningstid-parameter påkrævet, ingen aliases, API-nøgle som query-parameter (ikke Authorization header)
            - State: global wizard-state KUN i project-store.ts via Zustand — ikke lokal useState til wizard-data
            - TypeScript: ingen 'any', eksplicitte return-typer på eksporterede funktioner
            - Miljøvariabler: adgangkes via env-objekt i createServerFn, aldrig process.env i browser-kode

            Review-fokus (vær præcis og kortfattet):
            1. Bugs og logikfejl
            2. Manglende fejlhåndtering ved API-kald
            3. Node.js APIs der ikke virker i edge-runtime
            4. Server/klient-grænse-overtrædelser
            5. TypeScript type-usikkerheder

            Format: Markdown med emoji-ikoner. Max 600 ord. Ingen generiske råd — kun konkrete fund med filnavn og linjenummer hvis muligt. Hvis koden er fin, sig det kort.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 800,
                system: systemPrompt,
                messages: [{
                  role: 'user',
                  content: `Review denne diff:\n\n\`\`\`diff\n${diff}\n\`\`\``,
                }],
              }),
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Anthropic API ${response.status}: ${body.slice(0, 200)}`);
            }

            const data = await response.json();
            return data?.content?.[0]?.text ?? '_Claude returnerede intet svar._';
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post review comment
        if: steps.skip.outputs.skip == 'false' && steps.diff.outputs.lines > 50
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.result }}`;
            const lines  = ${{ steps.diff.outputs.lines }};
            const marker = '<!-- ai-pr-review -->';

            // Slet tidligere bot-kommentar (idempotent ved re-push)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            const body = [
              marker,
              '## 🤖 AI Code Review',
              '',
              review,
              '',
              `---`,
              `<sub>Reviewede ${lines} linjer TypeScript · [claude-haiku-4-5](https://anthropic.com) · Tilføj \`[skip-ai-review]\` i commit message for at springe over</sub>`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Skip notice
        if: steps.skip.outputs.skip == 'true'
        run: echo "AI review sprunget over pga. [skip-ai-review] i commit message."

      - name: Diff too small
        if: steps.skip.outputs.skip == 'false' && steps.diff.outputs.lines <= 50
        run: echo "Diff er ${{ steps.diff.outputs.lines }} linjer — springer review over (minimum 50)."
